spring.application.name=pastebin

spring.datasource.url=jdbc:h2:mem:pastebin;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true

pastebin.public-base-url=http://localhost:8080
pastebin.blob.storage-root=${java.io.tmpdir}/pastebin-blobs
